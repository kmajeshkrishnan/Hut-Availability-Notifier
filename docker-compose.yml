services:
  db:
    image: postgres:15
    container_name: freiburg_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: freiburg_app
    restart: unless-stopped
    environment:
      - LOG_LEVEL=DEBUG
    env_file:
      - .env
    depends_on:
      - db
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8005 --log-level info"
    ports:
      - "8005:8005"

volumes:
  db_data:
